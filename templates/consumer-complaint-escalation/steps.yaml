steps:
- id: diagnose
  title: Diagnose the complaint
  actor_mode: human_with_ai
  task_type: multiple_choice
  task_description: Identify the core issue.
  role: support_agent
  ai_assist: suggests
  grading:
    type: answer_key
    options:
    - delayed_onboarding
    - billing_error
    - feature_gap
    correct_answer: delayed_onboarding
    points: 2
- id: escalation_decision
  title: Decide escalation path
  actor_mode: team_with_ai
  task_type: structured_response
  task_description: Decide whether and how to escalate, citing policy.
  role: manager
  depends_on:
  - diagnose
  ai_assist: critiques
