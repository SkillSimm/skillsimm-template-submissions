name: validate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-packages:
    name: Validate template packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: pip install "pydantic>=2.10,<3" "pyyaml>=6"

      - name: Validate all template packages
        run: python scripts/validate_package.py
